<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Espacio</title>
<!--
    <link th:href="@{static/main.css}" rel="stylesheet" >
-->
    <style>
        body {
    background-color: #c5f2f4;

}
menu
   display: flex;
   list-style: none;
   padding: 0;
   width: 400px;
}

li {
  flex-grow: 1;
}

button {
  width: 100%;
}
        .outer {
            border-style: solid;
            border-width: 2px;
            border-color: blue;
        }
        .inner {
           border-style: dotted;
            border-width: 1px;
            border-color: black;

        }
        .outer td {
            background-color: lightgreen;
        }
        .inner td {
            background-color: lightyellow;
        }
        #actions{
            display:flex;

        }
    </style>
</head>
<body>
    <h1>Espacio app - Parkings</h1>
    <menu>
        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/parkings}" >Parkings</a></li>
    </menu>
    <hr/>
    <table class="outer">
        <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Motos cap.</th>
                <th>Cars cap.</th>
                <th>Spots</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tr th:each="parking : ${parkings}" >
            <td th:text="${parking.id}"></td>
            <td th:text="${parking.name}"></td>
            <td th:text="${parking.motosCapacity}"></td>
            <td th:text="${parking.carsCapacity}"></td>
            <td>
                <table class="inner">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Type</th>
                            <th>Location</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tr th:each="spot : ${parking.spots}" >
                        <td th:text="${spot.id}"></td>
                        <td th:text="${spot.type}"></td>
                        <td th:text="${spot.location}"></td>
                        <td th:text="${spot.pricePerHour}"></td>
                    </tr>
                </table>
            </td>
            <td>
                <span id="actions">
                    <button th:text="Edit" th:onclick="|editParking('${parking.id}')|"></button>&nbsp;
                    <form th:action="@{/parking/{id}(id=${parking.id})}" th:method="delete" style="display:inline;">
                        <button type="submit" th:text="Delete"></button>
                    </form>
                    <form th:action="@{/parking/{id}(id=${parking.id})}" th:method="put" style="display:inline;">
                        <button type="submit" >New spot</button>
                    </form>
                </span>
            </td>
        </tr>
    </table>
</body>
<script>
    function editParking(id)
    {
       // alert('Editing parking with id: ' + id);
        window.location.href= '/parking/' + id;
    }
    function deleteParking(id)
    {
        if (window.confirm("Are you sure?")) {
            //proceed deleting
            //alert('Deleting parking with id: ' + id);
        }
    }
</script>
</html>
