<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Espacio - Edit parking</title>
    <script type="text/javascript" th:src="@{/parking.js}" defer></script>

<!--
    <link th:href="@{static/main.css}" rel="stylesheet" >
-->
    <style>
        body {
    background-color: #c5f2f4;

}
menu
   display: flex;
   list-style: none;
   padding: 0;
   width: 400px;
}

li {
  flex-grow: 1;
}

button {
  width: 100%;
}
        .outer {
            border-style: solid;
            border-width: 2px;
            border-color: blue;
        }
        .inner {
           border-style: dotted;
            border-width: 1px;
            border-color: black;

        }
        .outer td {
            background-color: lightgreen;
        }
        .inner td {
            background-color: lightyellow;
        }
        #actions{


        }
    </style>
</head>
<body>
    <h1>Espacio app - Edit Parking</h1>
    <menu>
        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/parkings}" >Parkings</a></li>
    </menu>
    <hr/>

    <form th:action="@{/parking/{id}(id=${parking.id})}" method="post" th:object="${parking}">
        <input th:field="*{id}" readonly /><br/>
        <input th:field="*{name}" /><br/>
        <input th:field="*{motosCapacity}" /><br/>
        <input th:field="*{carsCapacity}" /><br/>
        <table th:field="*{spots}" id="tblSpots" class="inner">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Type</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tr th:each="spot, itemStat : ${parking.spots}" th:id="${itemStat.index}" >
                <td>
                    <input th:field="${parking.spots[__${itemStat.index}__].id}" disabled />
                </td>
                <td>
                    <input th:field="${parking.spots[__${itemStat.index}__].type}" disabled/>
                </td>
                <td>
                   <input th:field="${parking.spots[__${itemStat.index}__].location}" disabled />
                </td>
                <td>
                    <input th:field="${parking.spots[__${itemStat.index}__].pricePerHour}" disabled />
                </td>
                <td>
                    <button type="button" th:onclick="'editSpot(' + ${itemStat.index} + ', this)'">Edit</button>
                    <button type="button" th:onclick="'removeSpot(' + ${itemStat.index} + ',this.form)'">Remove</button>
                </td>
            </tr>
        </table>
        <span id="actions">

            <button type="button" onclick="enableTextBoxesAndUpdate(this.form)">Update</button>&nbsp;
            <button type="button" onclick="cancel()">Cancel</button>
        </span>
    </form>
</body>
</html>
