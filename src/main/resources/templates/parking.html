<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Espacio - Edit parking</title>
    <script type="text/javascript" th:src="@{/parking.js}" defer></script>

<!--
    <link th:href="@{static/main.css}" rel="stylesheet" >
-->
    <style>
        body {
    background-color: #c5f2f4;

}
menu
   display: flex;
   list-style: none;
   padding: 0;
   width: 400px;
}

li {
  flex-grow: 1;
}

button {
  width: 100%;
}
        .outer {
            border-style: solid;
            border-width: 2px;
            border-color: blue;
        }
        .inner {
           border-style: dotted;
            border-width: 1px;
            border-color: black;

        }
        .outer td {
            background-color: lightgreen;
        }
        .inner td {
            background-color: lightyellow;
        }
        #actions{


        }
        .noedit {
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Espacio app - Edit Parking</h1>

    <hr/>

    <form th:action="@{/parking/{id}(id=${parking.id})}" method="post" th:object="${parking}">
        <input th:field="*{id}" readonly disabled class="noedit"/><br/>
        <input th:field="*{name}" /><br/>
        <input th:field="*{motosCapacity}" /><br/>
        <input th:field="*{carsCapacity}" /><br/>
        <table th:field="*{spots}" id="tblSpots" class="inner">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Type</th>
                    <th>Location</th>
                    <th colspan="2">Dimensions (width, height)</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tr th:each="spot, itemStat : ${parking.spots}" th:id="${itemStat.index}" >
                <td>
                    <input th:field="${parking.spots[__${itemStat.index}__].id}" class="noedit" readonly disabled />
                </td>
                <td>
                    <select  th:field="${parking.spots[__${itemStat.index}__].type}" disabled>
                        <option th:value="MOTO" th:text="MOTO"></option>
                        <option th:value="CAR" th:text="CAR"></option>
                    </select>
                </td>
                <td>
                   <select th:field="${parking.spots[__${itemStat.index}__].location}" disabled>
                        <option th:value="NORTH" th:text="NORTH"></option>
                        <option th:value="EAST" th:text="EAST"></option>
                        <option th:value="SOUTH" th:text="SOUTH"></option>
                        <option th:value="WEST" th:text="WEST"></option>
                    <option th:value="NORTH_EAST" th:text="NORTH_EAST"></option>
                    <option th:value="NORTH_WEST" th:text="NORTH_WEST"></option>
                    <option th:value="SOUTH_EAST" th:text="SOUTH_EAST"></option>
                    <option th:value="SOUTH_WEST" th:text="SOUTH_WEST"></option>
                    </select>
                </td>
                <td>
                    <input type="number" th:field="${parking.spots[__${itemStat.index}__].dimension.width}" disabled />
                </td>
                <td>
                    <input type="number" th:field="${parking.spots[__${itemStat.index}__].dimension.height}" disabled />
                </td>
                <td>
                    <input th:field="${parking.spots[__${itemStat.index}__].pricePerHour}" disabled />
                </td>
                <td>
                    <button type="button" th:onclick="'editSpot(' + ${itemStat.index} + ', this)'">Edit</button>
                    <button type="button" th:onclick="'removeSpot(' + ${itemStat.index} + ',this.form)'">Remove</button>
                </td>
            </tr>
        </table>
        <span id="actions">

            <button type="button" onclick="enableTextBoxesAndUpdate(this.form)">Update</button>&nbsp;
            <button type="button" onclick="cancel()">Cancel</button>
        </span>
    </form>
</body>
</html>
