<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Espacio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"
            integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
            crossorigin="anonymous"></script>
    <link th:href="@{/main.css}" rel="stylesheet" >

</head>
<body class="container">
    <h1>Espacio app - Parkings</h1>

    <hr/>
    <form th:action="@{/parking/new}" th:method="post" style="width: 400px;">
        <button type="submit" class="btn btn-success" >New Parking</button>
    </form>
    <hr/>
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Motos cap.</th>
                <th>Cars cap.</th>
                <th>Spots</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tr th:each="parking : ${parkings}" >
            <td th:text="${parking.id}"></td>
            <td th:text="${parking.name}"></td>
            <td th:text="${parking.motosCapacity}"></td>
            <td th:text="${parking.carsCapacity}"></td>
            <td>
                <table class="table table-sm table-bordered">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Type</th>
                            <th>Location</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tr th:each="spot : ${parking.spots}" >
                        <td th:text="${spot.id}"></td>
                        <td th:text="${spot.type}"></td>
                        <td th:text="${spot.location}"></td>
                        <td th:text="${spot.pricePerHour}"></td>
                    </tr>
                </table>
            </td>
            <td>
                <span id="actions">
                    <button th:text="Edit" class="btn btn-secondary" th:onclick="|editParking('${parking.id}')|"></button>&nbsp;
                    <form th:action="@{/parking/{id}(id=${parking.id})}" th:method="delete" style="display:inline;">
                        <button type="submit" class="btn btn-danger" th:text="Delete"></button>
                    </form>
                    <form th:action="@{/parking/{id}(id=${parking.id})}" th:method="put" style="display:inline;">
                        <button class="btn btn-primary" type="submit" >New spot</button>
                    </form>
                </span>
            </td>
        </tr>
    </table>
</body>
<script>
    function editParking(id)
    {
       // alert('Editing parking with id: ' + id);
        window.location.href= '/parking/' + id;
    }
    function deleteParking(id)
    {

            //proceed deleting
            //alert('Deleting parking with id: ' + id);
        }
    }
</script>
</html>
